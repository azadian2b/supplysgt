version: 1
backend:
  phases:
    build:
      commands:
        - if [ "$SKIP_AMPLIFY_PUSH" != "true" ]; then amplifyPush --simple; fi
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - if [ "$GENERATE_AWS_EXPORTS" = "true" ]; then node scripts/write-aws-exports.js; fi
    build:
      commands:
        - CI=true npm test -- --watchAll=false
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
